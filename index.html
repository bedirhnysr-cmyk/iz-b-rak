<!DOCTYPE html>
<html>
<head>
  <title>Konum Takip</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// 1. Haritayı başlat
let map = L.map('map').setView([37.0, 35.3], 15);

// 2. Harita katmanı (OpenStreetMap)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// 3. Çizgi (iz) için liste
let path = [];

// 4. Çizgiyi oluştur
let polyline = L.polyline(path, {color: 'blue'}).addTo(map);

// 5. Konum güncelleme fonksiyonu
function updatePosition(position) {
  let lat = position.coords.latitude;
  let lng = position.coords.longitude;

  let newPoint = [lat, lng];

  // noktayı ekle
  path.push(newPoint);

  // çizgiyi güncelle
  polyline.setLatLngs(path);

  // haritayı kullanıcıya odakla
  map.setView(newPoint, 17);
}

// 6. Konumu sürekli takip et
navigator.geolocation.watchPosition(updatePosition);

</script>

</body>
</html>
