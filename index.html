<!DOCTYPE html>
<html>
<head>
  <title>Canlı Konum</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 90vh; width: 100%; }
    #btn {
      width: 100%;
      height: 10vh;
      font-size: 18px;
      border: none;
      background: #1e88e5;
      color: white;
    }
  </style>
</head>

<body>

<button id="btn">📍 Konumu Başlat</button>
<div id="map"></div>

<script>

let map;
let marker;
let path = [];
let polyline;

// 🔥 BÜYÜK İKON (emoji ile güçlü görünüm)
let bigIcon = L.divIcon({
  html: "📍",
  className: "",
  iconSize: [40, 40]
});

// Haritayı başlat
function initMap(lat, lng) {
  map = L.map('map').setView([lat, lng], 18);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  marker = L.marker([lat, lng], { icon: bigIcon }).addTo(map);

  polyline = L.polyline(path, {color: 'blue'}).addTo(map);
}

// Konum güncelle
function updatePosition(pos) {
  let lat = pos.coords.latitude;
  let lng = pos.coords.longitude;

  let point = [lat, lng];

  marker.setLatLng(point);
  path.push(point);
  polyline.setLatLngs(path);

  map.setView(point);
}

// Başlat
function start() {

  navigator.geolocation.getCurrentPosition((pos) => {

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    initMap(lat, lng);

    navigator.geolocation.watchPosition(updatePosition, (err) => {
      alert(err.message);
    }, {
      enableHighAccuracy: true
    });

  });

}

document.getElementById("btn").addEventListener("click", start);

</script>

</body>
</html>
